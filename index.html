<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060b14">
<title>رد الفعل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#060b14;--s1:#0c1322;--s2:#111b2e;--s3:#162035;
  --border:#1a2744;--border2:#243460;
  --text:#d4e0f7;--muted:#4a6080;--muted2:#6a80a0;
  --accent:#3b82f6;--accent-d:#1d3a6e;
  --green:#10b981;--green-d:#052e16;
  --amber:#f59e0b;--amber-d:#3d2800;
  --red:#ef4444;--red-d:#3d0c0c;
  --mono:'JetBrains Mono',monospace;
  --sans:'IBM Plex Sans Arabic',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--sans);color:var(--text);touch-action:manipulation;-webkit-font-smoothing:antialiased}
.app{width:100%;height:100%;display:flex;flex-direction:column;padding-top:var(--safe-top);padding-bottom:var(--safe-bot);overflow:hidden}
.header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:12px 18px 10px;background:var(--s1);border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:9px}
.brand-ring{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.brand-name{font-size:16px;font-weight:600;letter-spacing:.2px}
.brand-sub{font-size:10px;color:var(--muted);font-family:var(--mono)}
.tabbar{flex-shrink:0;display:flex;background:var(--s1);border-bottom:1px solid var(--border)}
.tb{flex:1;padding:11px 0;text-align:center;font-size:13px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:color .18s;position:relative;font-family:var(--sans)}
.tb.on{color:var(--accent)}
.tb.on::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:2px 2px 0 0}
.panels{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;opacity:0;pointer-events:none;transition:opacity .18s}
.panel.on{opacity:1;pointer-events:all}
#p-train{display:flex;flex-direction:column;padding:14px 14px 20px;gap:12px}
.arena-wrap{flex-shrink:0;border-radius:18px;overflow:hidden;border:1px solid var(--border)}
.prog-track{height:3px;background:var(--s2)}
.prog-fill{height:100%;background:var(--accent);width:0%;transition:width .08s linear}
#arena{background:var(--s1);min-height:46vh;position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;overflow:hidden;transition:background .12s;touch-action:manipulation}
#arena.s-wait{background:#0a1020}
#arena.s-go{background:#050f08}
#arena.s-early{background:#100505}
#arena.s-done{background:#070e1a}
.ac{text-align:center;pointer-events:none;padding:20px}
.ac-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.ac-title{font-size:24px;font-weight:500;line-height:1.2}
.ac-sub{font-size:12px;color:var(--muted);margin-top:8px;font-family:var(--mono)}
.counter-badge{position:absolute;top:12px;right:14px;font-size:11px;font-family:var(--mono);color:var(--muted);background:var(--s2);padding:4px 9px;border-radius:20px;border:1px solid var(--border)}
.target{position:absolute;border-radius:50%;cursor:pointer;touch-action:manipulation;transition:transform .08s;display:flex;align-items:center;justify-content:center}
.target:active{transform:scale(.86)}
.zone-wrap{flex-shrink:0}
.zone-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;gap:2px}
.zone{border-radius:2px}
.zone-lbs{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:5px}
.result-box{flex-shrink:0;border-radius:12px;padding:13px 16px;font-size:14px;font-weight:500;text-align:center;display:none}
.r-great{background:var(--green-d);color:#34d399;border:1px solid #065f46}
.r-good{background:#042d1b;color:#6ee7b7;border:1px solid #064e3b}
.r-ok{background:var(--amber-d);color:#fcd34d;border:1px solid #78350f}
.r-slow{background:var(--red-d);color:#fca5a5;border:1px solid #7f1d1d}
.stats{flex-shrink:0;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.scard{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:13px 8px;text-align:center}
.sv{font-size:22px;font-weight:600;font-family:var(--mono)}
.sl{font-size:10px;color:var(--muted);margin-top:3px}
.mini-hist{flex-shrink:0;display:none;align-items:flex-end;gap:3px;height:34px}
.mbar{border-radius:2px 2px 0 0;flex:1;min-width:4px;background:var(--s3);border-top:1px solid var(--border)}
.mbar.cur{background:var(--accent);border-color:var(--accent)}
.mbar.best-b{background:var(--green);border-color:var(--green)}
.actions{flex-shrink:0;display:flex;gap:8px}
.btn{flex:1;padding:14px;border-radius:12px;font-size:14px;font-family:var(--sans);cursor:pointer;border:1px solid var(--border);background:var(--s2);color:var(--muted);transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.btn-primary:active{background:#2563eb}
.btn-danger{background:var(--red-d);border-color:#5b1a1a;color:#fca5a5}
#p-history{padding:14px}
.chart-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.card-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px}
.legend{display:flex;gap:14px;margin-top:10px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.leg-dot{width:8px;height:8px;border-radius:2px}
.hist-list{display:flex;flex-direction:column;gap:8px;padding-bottom:20px}
.hi{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:13px 14px;display:flex;justify-content:space-between;align-items:center}
.hi-date{font-size:13px;font-weight:500}
.hi-meta{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.hi-nums{display:flex;flex-direction:column;align-items:flex-end;gap:3px;font-size:12px;font-family:var(--mono)}
.no-data{text-align:center;padding:60px 20px;color:var(--muted)}
.no-data-icon{font-size:36px;margin-bottom:12px;opacity:.3}
.no-data-txt{font-size:14px;line-height:1.7}
#p-settings{padding:14px;display:flex;flex-direction:column;gap:10px}
.sg{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px}
.sg-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:8px 15px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-family:var(--sans);cursor:pointer;transition:all .15s}
.chip:active{transform:scale(.96)}
.chip.on{border-color:var(--accent);background:var(--accent-d);color:#93c5fd}
.btn-full{width:100%;padding:14px;border-radius:12px;font-size:14px;font-family:var(--sans);cursor:pointer;border:1px solid #5b1a1a;background:var(--red-d);color:#fca5a5}
.btn-full:active{opacity:.8}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fi{animation:fadeIn .2s ease-out}
.si{animation:scaleIn .18s cubic-bezier(.34,1.56,.64,1)}
.pls{animation:pulse 1.4s ease-in-out infinite}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="brand">
      <div class="brand-ring"><div class="brand-dot"></div></div>
      <div><div class="brand-name">رد الفعل</div><div class="brand-sub">Reaction Trainer</div></div>
    </div>
    <div id="streak-wrap" style="display:none">
      <div style="background:var(--accent-d);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:12px;color:#93c5fd;font-family:var(--mono)" id="streak-lbl"></div>
    </div>
  </div>
  <div class="tabbar">
    <button class="tb on" onclick="tab('train')">تدريب</button>
    <button class="tb" onclick="tab('history')">السجل</button>
    <button class="tb" onclick="tab('settings')">إعدادات</button>
  </div>
  <div class="panels">
    <div id="p-train" class="panel on">
      <div class="arena-wrap">
        <div class="prog-track"><div class="prog-fill" id="prog"></div></div>
        <div id="arena" onclick="arenaClick()">
          <div class="counter-badge" id="counter" style="display:none"></div>
          <div class="ac" id="ac">
            <div class="ac-icon" style="background:var(--s2);border:1px solid var(--border)">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3" fill="#3b82f6" stroke="none"/><line x1="12" y1="3" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="21"/><line x1="3" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="21" y2="12"/></svg>
            </div>
            <div class="ac-title">انقر للبدء</div>
            <div class="ac-sub">اضغط بمجرد ظهور الهدف</div>
          </div>
        </div>
      </div>
      <div class="zone-wrap">
        <div class="zone-bar">
          <div class="zone" style="background:#065f46;flex:1.5"></div>
          <div class="zone" style="background:#1d4ed8;flex:2"></div>
          <div class="zone" style="background:#78350f;flex:2"></div>
          <div class="zone" style="background:#7f1d1d;flex:2.5"></div>
        </div>
        <div class="zone-lbs"><span>&lt;180ms</span><span>270ms</span><span>400ms+</span></div>
      </div>
      <div id="result-box" class="result-box"></div>
      <div class="stats">
        <div class="scard"><div class="sv" id="s-avg" style="color:#60a5fa">—</div><div class="sl">متوسط</div></div>
        <div class="scard"><div class="sv" id="s-best" style="color:#10b981">—</div><div class="sl">أفضل</div></div>
        <div class="scard"><div class="sv" id="s-count" style="color:#f59e0b">0</div><div class="sl">محاولات</div></div>
      </div>
      <div id="mini-hist" class="mini-hist"></div>
      <div class="actions">
        <button class="btn btn-danger" onclick="resetSession()">إعادة</button>
        <button class="btn btn-primary" onclick="saveSession()">حفظ الجلسة</button>
      </div>
    </div>
    <div id="p-history" class="panel">
      <div class="chart-card">
        <div class="card-lbl">تطور الأداء</div>
        <div style="position:relative;height:180px"><canvas id="pc" role="img" aria-label="رسم بياني لتطور زمن رد الفعل">لا توجد بيانات.</canvas></div>
        <div class="legend">
          <div class="leg"><div class="leg-dot" style="background:#60a5fa"></div>متوسط</div>
          <div class="leg"><div class="leg-dot" style="background:#10b981"></div>أفضل</div>
        </div>
      </div>
      <div id="hist-list" class="hist-list"></div>
    </div>
    <div id="p-settings" class="panel">
      <div class="sg">
        <div class="sg-lbl">مستوى الصعوبة</div>
        <div class="chips" id="d-diff">
          <button class="chip on" onclick="opt('diff','easy',this,'d-diff')">سهل 3–5ث</button>
          <button class="chip" onclick="opt('diff','medium',this,'d-diff')">متوسط 1.5–3ث</button>
          <button class="chip" onclick="opt('diff','hard',this,'d-diff')">صعب 0.8–2ث</button>
          <button class="chip" onclick="opt('diff','pro',this,'d-diff')">محترف 0.3–1ث</button>
        </div>
      </div>
      <div class="sg">
        <div class="sg-lbl">المحفز</div>
        <div class="chips" id="d-stim">
          <button class="chip on" onclick="opt('stim','visual',this,'d-stim')">بصري فقط</button>
          <button class="chip" onclick="opt('stim','both',this,'d-stim')">بصري + صوتي</button>
        </div>
      </div>
      <div class="sg">
        <div class="sg-lbl">شكل الهدف</div>
        <div class="chips" id="d-shape">
          <button class="chip on" onclick="opt('shape','dot',this,'d-shape')">نقطة</button>
          <button class="chip" onclick="opt('shape','ring',this,'d-shape')">حلقة</button>
          <button class="chip" onclick="opt('shape','flash',this,'d-shape')">وميض كامل</button>
        </div>
      </div>
      <div class="sg">
        <div class="sg-lbl">عدد المحاولات</div>
        <div class="chips" id="d-trials">
          <button class="chip" onclick="opt('trials',5,this,'d-trials')">5</button>
          <button class="chip on" onclick="opt('trials',10,this,'d-trials')">10</button>
          <button class="chip" onclick="opt('trials',20,this,'d-trials')">20</button>
          <button class="chip" onclick="opt('trials',0,this,'d-trials')">بلا حد</button>
        </div>
      </div>
      <button class="btn-full" onclick="clearAll()">مسح كل البيانات</button>
    </div>
  </div>
</div>
<script>
const CFG={diff:'easy',stim:'visual',shape:'dot',trials:10};
const DELAYS={easy:[3000,5000],medium:[1500,3000],hard:[800,2000],pro:[300,1000]};
const TCOLORS=['#f472b6','#34d399','#60a5fa','#fb923c','#a78bfa','#facc15','#2dd4bf','#f87171'];
let phase='idle',t0=0,wTimer=null,tickInt=null,attempts=[],pgChart=null;

function tab(name){
  ['train','history','settings'].forEach((n,i)=>{
    document.querySelectorAll('.tb')[i].classList.toggle('on',n===name);
    document.getElementById('p-'+n).classList.toggle('on',n===name);
  });
  if(name==='history')renderHistory();
}
function opt(key,val,el,row){
  CFG[key]=val;
  document.getElementById(row).querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}
function r(a,b){return Math.random()*(b-a)+a;}
function setAC(html){
  const ac=document.getElementById('ac');
  ac.innerHTML=html;
  ac.classList.remove('fi');void ac.offsetWidth;ac.classList.add('fi');
}
function arenaClick(){
  if(phase==='idle')startWait();
  else if(phase==='wait'){clearTimeout(wTimer);clearInterval(tickInt);removeTarget();earlyFail();}
}
function startWait(){
  phase='wait';
  const[lo,hi]=DELAYS[CFG.diff];
  const delay=r(lo,hi);
  const prog=document.getElementById('prog');
  prog.style.transition='none';prog.style.width='0%';
  void prog.offsetWidth;prog.style.transition='width .08s linear';
  document.getElementById('arena').className='s-wait';
  document.getElementById('counter').style.display='none';
  setAC(`<div class="ac-icon pls" style="background:#0a1422;border:1px solid #243460"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3b5080" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="9" stroke-dasharray="4 3"/><circle cx="12" cy="12" r="2" fill="#3b5080" stroke="none"/></svg></div><div class="ac-title" style="color:#4a6080">انتظر...</div><div class="ac-sub">لا تضغط قبل الأوان</div>`);
  let elapsed=0;
  tickInt=setInterval(()=>{
    elapsed+=80;
    prog.style.width=Math.min(elapsed/delay*100,100)+'%';
    if(elapsed>=delay)clearInterval(tickInt);
  },80);
  wTimer=setTimeout(()=>{clearInterval(tickInt);showTarget();},delay);
}
function removeTarget(){document.getElementById('arena').querySelectorAll('.target').forEach(t=>t.remove());}
function showTarget(){
  phase='ready';t0=performance.now();
  const a=document.getElementById('arena');
  const c=TCOLORS[Math.floor(Math.random()*TCOLORS.length)];
  const cnt=CFG.trials>0?`${attempts.length+1} / ${CFG.trials}`:`${attempts.length+1}`;
  document.getElementById('counter').textContent=cnt;
  document.getElementById('counter').style.display='block';
  document.getElementById('prog').style.width='100%';
  if(CFG.shape==='flash'){
    a.className='s-go';
    setAC(`<div class="ac-icon si" style="background:#052e16;border:1px solid #065f46"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="#10b981"/></svg></div><div class="ac-title si" style="color:#10b981">انقر الآن!</div>`);
    a.onclick=recordHit;
  } else {
    a.className='s-go';
    document.getElementById('ac').innerHTML='';
    const el=document.createElement('div');
    el.className='target si';
    const sz=64;
    el.style.cssText=`left:${r(8,68)}%;top:${r(10,58)}%;width:${sz}px;height:${sz}px;`;
    if(CFG.shape==='dot'){el.style.cssText+=`background:${c};`;}
    else{el.style.cssText+=`border:3px solid ${c};background:${c}18;`;}
    el.onclick=e=>{e.stopPropagation();recordHit();};
    a.appendChild(el);a.onclick=null;
  }
  if(CFG.stim==='both')playBeep();
}
function recordHit(){
  const rt=Math.round(performance.now()-t0);
  phase='done';removeTarget();attempts.push(rt);updateStats(rt);
  document.getElementById('prog').style.width='0';
  document.getElementById('counter').style.display='none';
  const done=CFG.trials>0&&attempts.length>=CFG.trials;
  if(done){
    document.getElementById('arena').className='s-done';
    setAC(`<div class="ac-icon si" style="background:#042718;border:1px solid #065f46"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="ac-title" style="color:#10b981">مكتمل!</div><div class="ac-sub">احفظ النتائج أو أعد</div>`);
    document.getElementById('arena').onclick=null;phase='idle';
  } else {
    const rem=CFG.trials>0?`${attempts.length} / ${CFG.trials}`:`${attempts.length}`;
    document.getElementById('arena').className='';
    setAC(`<div style="font-family:var(--mono);font-size:40px;font-weight:600;color:#60a5fa" class="si">${rt}<span style="font-size:14px;color:var(--muted);margin-right:4px">ms</span></div><div class="ac-sub">${rem} · انقر للتالية</div>`);
    document.getElementById('arena').onclick=arenaClick;phase='idle';
  }
}
function earlyFail(){
  phase='idle';
  document.getElementById('prog').style.width='0';
  document.getElementById('counter').style.display='none';
  document.getElementById('arena').className='s-early';
  setAC(`<div class="ac-icon si" style="background:#2d0a0a;border:1px solid #5b1a1a"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 22h20L12 2z" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-linejoin="round"/><line x1="12" y1="9" x2="12" y2="14" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="17.5" r="1" fill="#ef4444"/></svg></div><div class="ac-title" style="color:#ef4444">مبكر جداً!</div><div class="ac-sub">انتظر ظهور الهدف</div>`);
  document.getElementById('arena').onclick=arenaClick;
  setTimeout(()=>{
    if(phase==='idle'){
      document.getElementById('arena').className='';
      setAC(`<div class="ac-icon" style="background:var(--s2);border:1px solid var(--border)"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polygon points="10,8 16,12 10,16" fill="#3b82f6" stroke="none"/></svg></div><div class="ac-title">استمر</div><div class="ac-sub">انقر للتالية</div>`);
    }
  },1500);
}
function rating(ms){
  if(ms<180)return{cls:'r-great',msg:`⚡ خاطف — ${ms} ms`};
  if(ms<270)return{cls:'r-good',msg:`✓ ممتاز — ${ms} ms`};
  if(ms<400)return{cls:'r-ok',msg:`جيد — ${ms} ms`};
  return{cls:'r-slow',msg:`${ms} ms — واصل التدريب`};
}
function updateStats(latest){
  const avg=Math.round(attempts.reduce((a,b)=>a+b,0)/attempts.length);
  const best=Math.min(...attempts);
  const prev=attempts.length>1?Math.min(...attempts.slice(0,-1)):Infinity;
  document.getElementById('s-avg').textContent=avg;
  document.getElementById('s-best').textContent=best;
  document.getElementById('s-count').textContent=attempts.length;
  const R=rating(latest);
  const newRec=latest<=prev&&attempts.length>1;
  const box=document.getElementById('result-box');
  box.style.display='block';box.className='result-box '+R.cls+' fi';
  box.textContent=R.msg+(newRec?'  🏆 رقم قياسي!':'');
  renderMiniHist();
}
function renderMiniHist(){
  const c=document.getElementById('mini-hist');
  c.style.display='flex';
  const mx=Math.max(...attempts),mn=Math.min(...attempts);
  const range=mx-mn||1;
  c.innerHTML=attempts.map((v,i)=>{
    const h=Math.max(5,Math.round((1-(v-mn)/range)*28)+5);
    const isCur=i===attempts.length-1;
    const isBest=v===mn;
    const cls=isBest?'best-b':isCur?'cur':'';
    return`<div class="mbar ${cls}" style="height:${h}px" title="${v}ms"></div>`;
  }).join('');
}
function resetSession(){
  attempts=[];phase='idle';clearTimeout(wTimer);clearInterval(tickInt);removeTarget();
  document.getElementById('prog').style.width='0';
  document.getElementById('counter').style.display='none';
  ['s-avg','s-best'].forEach(id=>document.getElementById(id).textContent='—');
  document.getElementById('s-count').textContent='0';
  document.getElementById('result-box').style.display='none';
  document.getElementById('mini-hist').style.display='none';
  document.getElementById('arena').className='';
  document.getElementById('arena').onclick=arenaClick;
  setAC(`<div class="ac-icon" style="background:var(--s2);border:1px solid var(--border)"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3" fill="#3b82f6" stroke="none"/><line x1="12" y1="3" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="21"/><line x1="3" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="21" y2="12"/></svg></div><div class="ac-title">انقر للبدء</div><div class="ac-sub">اضغط بمجرد ظهور الهدف</div>`);
}
function saveSession(){
  if(!attempts.length){alert('لا توجد محاولات للحفظ');return;}
  const avg=Math.round(attempts.reduce((a,b)=>a+b,0)/attempts.length);
  const best=Math.min(...attempts);
  const sessions=JSON.parse(localStorage.getItem('rt_sessions')||'[]');
  sessions.push({date:new Date().toISOString(),attempts:[...attempts],avg,best,diff:CFG.diff});
  localStorage.setItem('rt_sessions',JSON.stringify(sessions));
  const box=document.getElementById('result-box');
  box.style.display='block';box.className='result-box r-good fi';
  box.textContent=`محفوظ ✓ — ${attempts.length} محاولة · ⌀ ${avg}ms`;
  const sw=document.getElementById('streak-wrap');
  const sl=document.getElementById('streak-lbl');
  if(sessions.length>=2){
    const last2=sessions.slice(-2);
    if(last2[1].avg<last2[0].avg){sw.style.display='block';sl.textContent='↑ تحسن مستمر';}
  }
}
function clearAll(){
  if(confirm('حذف جميع السجلات؟')){localStorage.removeItem('rt_sessions');renderHistory();}
}
function renderHistory(){
  const sessions=JSON.parse(localStorage.getItem('rt_sessions')||'[]');
  const list=document.getElementById('hist-list');
  const cc=document.querySelector('.chart-card');
  if(!sessions.length){
    list.innerHTML='<div class="no-data"><div class="no-data-icon">◎</div><div class="no-data-txt">لا توجد جلسات محفوظة بعد.<br>دوّن تدريبك أولاً.</div></div>';
    if(pgChart){pgChart.destroy();pgChart=null;}
    cc.style.display='none';return;
  }
  cc.style.display='block';
  list.innerHTML=sessions.slice().reverse().map(s=>{
    const d=new Date(s.date);
    const ds=d.toLocaleDateString('ar-DZ')+' '+d.toLocaleTimeString('ar-DZ',{hour:'2-digit',minute:'2-digit'});
    const dl={easy:'سهل',medium:'متوسط',hard:'صعب',pro:'محترف'}[s.diff]||'';
    return`<div class="hi"><div><div class="hi-date">${ds}</div><div class="hi-meta">${s.attempts.length} محاولة · ${dl}</div></div><div class="hi-nums"><span style="color:#60a5fa">⌀ ${s.avg}ms</span><span style="color:#10b981">↓ ${s.best}ms</span></div></div>`;
  }).join('');
  if(pgChart)pgChart.destroy();
  const ctx=document.getElementById('pc').getContext('2d');
  pgChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:sessions.map((_,i)=>`#${i+1}`),
      datasets:[
        {label:'متوسط',data:sessions.map(s=>s.avg),borderColor:'#60a5fa',backgroundColor:'rgba(96,165,250,.08)',borderWidth:2,pointRadius:3,pointBackgroundColor:'#60a5fa',fill:true,tension:.35},
        {label:'أفضل',data:sessions.map(s=>s.best),borderColor:'#10b981',backgroundColor:'transparent',borderWidth:2,pointRadius:3,pointBackgroundColor:'#10b981',borderDash:[5,4],tension:.35}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#4a6080',font:{size:10}},grid:{color:'#1a2744'}},
        y:{reverse:true,ticks:{color:'#4a6080',font:{size:10},callback:v=>v+'ms'},grid:{color:'#1a2744'}}
      }
    }
  });
}
function playBeep(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.frequency.value=1000;o.type='sine';
    g.gain.setValueAtTime(.3,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.15);
    o.start();o.stop(ac.currentTime+.15);
  }catch(e){}
}
document.getElementById('arena').onclick=arenaClick;
renderHistory();
</script>
